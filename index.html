<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a12">
    <title>Omen - Καφεμαντεία</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a12; color: #f0e6ff; overflow-y: auto; }
        .page { display: none; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .page.active { display: flex; }
        .btn { padding: 14px 22px; border: none; border-radius: 60px; font-weight: 700; cursor: pointer; }
        .btn-mystic { background: linear-gradient(145deg, #f7dc6f, #d4ac0d); color: #1a0e1f; font-size: 1.2rem; }
        .btn-green { background: linear-gradient(145deg, #2ecc71, #1e8449); color: #fff; width: 100%; padding: 18px; font-size: 1.15rem; margin-top: 12px; border-radius: 50px; }
        .btn-green:disabled { background: #3a3a4a; color: #777; }
        .btn-earn { background: linear-gradient(145deg, #f39c12, #e67e22); color: #1a0e1f; padding: 14px 28px; border-radius: 60px; font-weight: 700; }
        .shop-btn { background: linear-gradient(145deg, #2ecc71, #1e8449); color: #fff; padding: 12px; border: none; border-radius: 30px; font-weight: 700; margin: 5px; width: 100%; }
        .photo-slot { width: 100px; height: 100px; border: 2px dashed rgba(241,196,15,0.5); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-position: center; color: #f7dc6f; font-size: 1.5rem; margin: 5px; }
        #consent-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #consent-overlay.hidden { display: none; }
        #consent-modal { background: linear-gradient(145deg, #1a0e2a, #2a1a3a); border: 2px solid rgba(241,196,15,0.3); border-radius: 30px; padding: 35px 25px; max-width: 480px; width: 100%; text-align: center; }
        #consent-modal h2 { color: #f7dc6f; }
        #consent-modal p { color: #d5c8e8; }
        #consent-btn { background: linear-gradient(145deg, #f7dc6f, #d4ac0d); color: #1a0e1f; padding: 16px 32px; border: none; border-radius: 60px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; }
        .consent-lang-bar { display: flex; align-items: center; gap: 8px; justify-content: center; margin: 15px 0; }
        .consent-lang-bar select { background: rgba(10,5,25,0.9); color: #f7dc6f; border: 1px solid rgba(241,196,15,0.3); border-radius: 20px; padding: 8px; }
        .consent-lang-bar button { width: 36px; height: 36px; border-radius: 50%; background: #f7dc6f; color: #1a0e1f; border: none; font-weight: 700; cursor: pointer; }
        #result-area { display: none; background: rgba(20,12,30,0.8); backdrop-filter: blur(8px); border-radius: 30px; padding: 20px; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>
    <!-- CONSENT OVERLAY (ΜΟΝΟ ΕΔΩ ΤΟ ΓΛΩΣΣΙΚΟ ΠΛΑΙΣΙΟ) -->
    <div id="consent-overlay">
        <div id="consent-modal">
            <div style="font-size:4rem;margin-bottom:15px;">🔮</div>
            <h2 data-translate="true">Καλώς ορίσατε στο Omen!</h2>
            <p data-translate="true">Επιβεβαιώστε ότι είστε <strong>άνω των 18 ετών</strong> και αποδέχεστε ότι η εφαρμογή χρησιμοποιεί AI για ψυχαγωγικούς σκοπούς.</p>
            <div class="consent-lang-bar">
                <select id="consent-lang-select" onchange="changeLanguage(this.value)">
                    <option value="el">🇬🇷 Ελληνικά</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="it">🇮🇹 Italiano</option>
                    <option value="ar">🇸🇦 العربية</option>
                    <option value="zh-CN">🇨🇳 中文</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="ru">🇷🇺 Русский</option>
                    <option value="tr">🇹🇷 Türkçe</option>
                    <option value="nl">🇳🇱 Nederlands</option>
                    <option value="pt">🇵🇹 Português</option>
                    <option value="sv">🇸🇪 Svenska</option>
                    <option value="no">🇳🇴 Norsk</option>
                    <option value="da">🇩🇰 Dansk</option>
                    <option value="fi">🇫🇮 Suomi</option>
                    <option value="pl">🇵🇱 Polski</option>
                    <option value="cs">🇨🇿 Čeština</option>
                    <option value="ro">🇷🇴 Română</option>
                    <option value="bg">🇧🇬 Български</option>
                    <option value="uk">🇺🇦 Українська</option>
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="hi">🇮🇳 हिन्दी</option>
                    <option value="vi">🇻🇳 Tiếng Việt</option>
                    <option value="th">🇹🇭 ไทย</option>
                    <option value="id">🇮🇩 Indonesia</option>
                    <option value="iw">🇮🇱 עברית</option>
                </select>
                <button onclick="applyTranslation()">▶</button>
            </div>
            <button id="consent-btn" onclick="acceptConsent()" data-translate="true">Συμφωνώ & Είμαι άνω των 18 ετών</button>
        </div>
    </div>

    <!-- ΚΥΡΙΑ ΣΕΛΙΔΑ -->
    <div id="main" class="page active" style="display:none;">
        <div style="font-size:4rem;">🔮</div>
        <h1 style="background:linear-gradient(135deg,#f9d976,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:3rem;">Omen</h1>
        <p data-translate="true">Ανέβασε 3 φωτογραφίες του φλιτζανιού σου</p>
        
        <!-- 3 Photo Slots -->
        <div id="photo-slots" style="display:flex; gap:10px; justify-content:center; margin:15px 0; flex-wrap:wrap;"></div>
        
        <button id="analyze-btn" class="btn-green" disabled onclick="analyze()" data-translate="true">
            🔮 Ανάλυση (3 φωτ.) - 15 πόντοι
        </button>
        
        <div style="display:flex; align-items:center; gap:12px; margin:15px 0; flex-wrap:wrap; justify-content:center;">
            <button class="btn-earn" onclick="earnPoints()" data-translate="true">🎁 Κέρδισε 10 Πόντους</button>
            <button class="btn-earn" onclick="shareReferral()" data-translate="true">👥 Πρόσκληση Φίλων</button>
            <span style="background:rgba(20,10,40,0.9); border:2px solid rgba(241,196,15,0.5); border-radius:30px; padding:8px 16px; color:#f7dc6f; font-weight:700;">
                💎 <span id="points-display">0</span>
            </span>
        </div>
        
        <!-- Shop -->
        <div style="width:100%; margin:20px 0;">
            <h3 style="color:#f7dc6f; text-align:center;" data-translate="true">🛒 Αγόρασε Πόντους</h3>
            <button class="shop-btn" onclick="buy('starter')">45 πόντοι - 1€</button>
            <button class="shop-btn" onclick="buy('value')">75 πόντοι - 1.50€</button>
            <button class="shop-btn" onclick="buy('pro')">150 πόντοι - 2.99€</button>
        </div>
        
        <!-- Αποτελέσματα -->
        <div id="result-area">
            <h2 style="color:#f5d76e; text-align:center;">☽ Η Ετυμηγορία ☾</h2>
            <div id="result-text" style="color:#e6d5f5; line-height:1.7;"></div>
        </div>
    </div>

    <script src="script.js?v=10"></script>
</body>
</html>
