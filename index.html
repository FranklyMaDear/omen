<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    
    <!-- ===== SEO & Social Media ===== -->
    <title>OmenRead - Καφεμαντεία με AI</title>
    <meta name="description" content="OmenRead: Καφεμαντεία με AI - Πολίτικο Φλιτζάνι. Ανέβασε φωτογραφία και το AI αναλύει τα σύμβολα.">
    
    <!-- Favicon -->
    <link rel="icon" href="omen.png" type="image/png">
    <link rel="apple-touch-icon" href="omen.png">
    
    <!-- Open Graph (Facebook, X, etc.) -->
    <meta property="og:title" content="OmenRead - Καφεμαντεία με AI">
    <meta property="og:description" content="OmenRead: Καφεμαντεία με AI - Πολίτικο Φλιτζάνι. Ανέβασε φωτογραφία και το AI αναλύει τα σύμβολα.">
    <meta property="og:image" content="https://franklymadear.github.io/omen/omen.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://franklymadear.github.io/omen/">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="OmenRead - Καφεμαντεία με AI">
    <meta name="twitter:description" content="OmenRead: Καφεμαντεία με AI - Πολίτικο Φλιτζάνι. Ανέβασε φωτογραφία και το AI αναλύει τα σύμβολα.">
    <meta name="twitter:image" content="https://franklymadear.github.io/omen/omen.png">
    
    <!-- ========== MONETAG SDK ========== -->
    <script src='//libtl.com/sdk.js' data-zone='10985740' data-sdk='show_10985740'></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ... (τα ίδια styles) ... */
    </style>
</head>
<body>
    <div id="container">
        <h1>OmenRead</h1>
        <p style="color:#aaa;">Καφεμαντεία με AI - Πολίτικο Φλιτζάνι</p>

        <div id="upload-section">
            <div class="instructions">
                <strong>📌 Οδηγίες:</strong> Ανέβασε ή σκάνερε μια φωτογραφία του φλιτζανιού σου. Το AI θα αναλύσει τα σύμβολα και θα σου δώσει μια λεπτομερή περιγραφή.
            </div>
        </div>

        <div id="camera-wrapper">
            <video id="webcam" playsinline></video>
            <div id="camera-guide"></div>
        </div>

        <div class="controls">
            <button class="btn btn-gold" id="startBtn" onclick="startCamera()">📷 Κάμερα</button>
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">📁 Ανέβασε</button>
            <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
            <button class="btn btn-green" id="scanBtn" onclick="scanAndAnalyze()" disabled>🔍 Ανάλυση</button>
        </div>

        <div id="upload-preview-container"></div>
        
        <div id="loading">⏳ Αναλύω τον καφέ με AI...</div>

        <div id="result-area">
            <h2>🔮 Ανάλυση Φλιτζανιού</h2>
            
            <div id="cup-guide">
                <!-- ... (το ίδιο svg) ... -->
            </div>
            
            <div id="element-display"></div>
            <div id="result-text"></div>
            <div id="multi-symbols"></div>
            <div class="stat-grid" id="stats-grid"></div>
            
            <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
                <button class="btn btn-red" onclick="resetAll()" style="border-radius: 50%; width: 50px; height: 50px; padding: 0; font-size: 20px; display: flex; align-items: center; justify-content: center;">🔄</button>
            </div>
        </div>
    </div>

    <script>
        // --- Ρύθμιση API (Hugging Face) ---
        const API_URL = "https://franklymadear-omenread.hf.space/analyze";

        // --- Camera Setup ---
        const video = document.getElementById('webcam');
        let currentImage = null;
        let camera = null;
        let capturedPhotos = [];
        let uploadedImages = [];
        let analysisResult = null;

        // --- Εκκίνηση κάμερας ---
        function startCamera() {
            const btn = document.getElementById('startBtn');
            
            if (camera) {
                takePhoto();
                return;
            }
            
            btn.disabled = true;
            btn.innerText = "⏳...";
            
            document.getElementById('camera-guide').style.display = 'block';
            
            camera = new Camera(video, {
                onFrame: async () => {},
                width: 500,
                height: 500,
                facingMode: 'environment'
            });
            camera.start().then(() => {
                btn.innerText = "📷 Λήψη";
                btn.style.background = "#2ecc71";
                btn.disabled = false;
            }).catch(err => {
                console.error("Camera error:", err);
                btn.innerText = "📷 Κάμερα";
                btn.style.background = "";
                btn.disabled = false;
                alert("Σφάλμα κάμερας: " + err);
            });
        }

        // --- Λήψη φωτογραφίας ---
        function takePhoto() {
            if (!camera) {
                alert("Πατήστε πρώτα το κουμπί 'Κάμερα'");
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const photo = canvas.toDataURL('image/jpeg');

            currentImage = photo;
            capturedPhotos.push(photo);
            
            const container = document.getElementById('upload-preview-container');
            container.innerHTML = '';
            const img = document.createElement('img');
            img.src = photo;
            container.appendChild(img);

            document.getElementById('camera-guide').style.display = 'none';
            document.getElementById('cup-guide').style.display = 'block';

            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanBtn').textContent = "🔍 Ανάλυση";
        }

        // --- Upload φωτογραφίας ---
        function handleUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const container = document.getElementById('upload-preview-container');
            container.innerHTML = '';
            uploadedImages = [];

            const file = files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                container.appendChild(img);
                
                currentImage = e.target.result;
                uploadedImages.push(e.target.result);
                
                document.getElementById('cup-guide').style.display = 'block';
                
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('scanBtn').textContent = "🔍 Ανάλυση";
            };
            reader.readAsDataURL(file);
        }

        // --- Ανάλυση φωτογραφίας ---
        async function scanAndAnalyze() {
            if (!currentImage) {
                alert("Πατήστε πρώτα 'Κάμερα' ή 'Ανέβασε' για να τραβήξετε/ανεβάσετε μια φωτογραφία");
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('scanBtn').textContent = "⏳...";

            await sendToAPI(currentImage);
        }

        // --- Σύνδεση με το API ---
        async function sendToAPI(base64Image) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                if (!response.ok) {
                    throw new Error("Σφάλμα API: " + response.status);
                }

                const data = await response.json();
                
                if (data.success) {
                    displayResult(data);
                    analysisResult = data;
                } else {
                    alert("Σφάλμα ανάλυσης: " + data.error);
                }
            } catch (error) {
                alert("Σφάλμα σύνδεσης με το API: " + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('scanBtn').textContent = "🔍 Ανάλυση";
            }
        }

        // --- Εμφάνιση αποτελέσματος ---
        function displayResult(r) {
            const area = document.getElementById('result-area');
            const text = document.getElementById('result-text');
            const grid = document.getElementById('stats-grid');
            const elementDisplay = document.getElementById('element-display');
            const multiSymbols = document.getElementById('multi-symbols');

            area.style.display = 'block';

            elementDisplay.innerHTML = `<strong>☕ Καφεμαντεία - Πολίτικο Φλιτζάνι</strong>`;
            elementDisplay.style.color = "#FFD700";
            
            if (r.symbols && Array.isArray(r.symbols) && r.symbols.length > 0) {
                let symbolsHtml = `<h3>🔍 Σύμβολα που εντοπίστηκαν:</h3>`;
                
                r.symbols.forEach((s, index) => {
                    symbolsHtml += `
                        <div class="symbol-item">
                            <div class="symbol-name">🔮 Σύμβολο ${index + 1}: ${s.name}</div>
                            <div class="symbol-position">📍 Θέση: ${s.position || "Δεν προσδιορίστηκε"}</div>
                            <div class="symbol-interpretation">📖 Ερμηνεία: ${s.interpretation}</div>
                        </div>
                    `;
                });
                
                multiSymbols.innerHTML = symbolsHtml;
                
                text.innerHTML = `
                    <strong>📊 Σύνοψη:</strong><br>
                    Εντοπίστηκαν <strong>${r.symbols.length}</strong> σύμβολα στο φλιτζάνι σας.
                    <br><br>
                    <strong>💡 Γενική υπόδειξη:</strong> Όσα περισσότερα σύμβολα, τόσο πιο πλούσια και γεμάτη είναι η ζωή σας. 
                    Αν τα σύμβολα είναι κοντά στο χερούλι, τα γεγονότα θα συμβούν σύντομα.
                `;
                
                let statsHtml = `
                    <div class="stat-item"><span class="badge">Σύμβολα</span><br>${r.symbols.length}</div>
                    <div class="stat-item"><span class="badge">Θέσεις</span><br>${r.symbols.map(s => s.position || "Δ/Α").join(", ")}</div>
                `;
                grid.innerHTML = statsHtml;
            }
        }

        // --- Reset ---
        function resetAll() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('startBtn').innerText = "📷 Κάμερα";
            document.getElementById('startBtn').style.background = "#FFD700";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('scanBtn').textContent = "🔍 Ανάλυση";
            document.getElementById('upload-preview-container').innerHTML = '';
            document.getElementById('cup-guide').style.display = 'none';
            document.getElementById('camera-guide').style.display = 'none';
            currentImage = null;
            capturedPhotos = [];
            uploadedImages = [];
            analysisResult = null;
            
            if (camera) {
                camera.stop();
                camera = null;
                video.srcObject = null;
            }
        }
    </script>
</body>
</html>
