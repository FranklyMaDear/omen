<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========== META TAGS για Social & Αρχική Οθόνη ========== -->
    <title>Omen - Καφεμαντεία με AI</title>
    
    <!-- Βασικά Meta για SEO & Social -->
    <meta name="description" content="Διάβασε το φλιτζάνι του καφέ σου με τη βοήθεια AI. Μαγική εμπειρία καφεμαντείας.">
    <meta name="theme-color" content="#0a0a12">
    
    <!-- Open Graph (Facebook, LinkedIn, κλπ.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Omen - Καφεμαντεία με AI">
    <meta property="og:description" content="Η Μαντάμ Ζαΐρα διαβάζει τις σκιές του καφέ σου. Δοκίμασε τη μαγική εμπειρία.">
    <meta property="og:url" content="https://franklymadear-omenread.hf.space">
    <meta property="og:image" content="https://franklymadear-omenread.hf.space/omen.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:locale" content="el_GR">
    
    <!-- Twitter Card (X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Omen - Καφεμαντεία με AI">
    <meta name="twitter:description" content="Διάβασε το φλιτζάνι του καφέ σου με AI. Μια μοναδική εμπειρία.">
    <meta name="twitter:image" content="https://franklymadear-omenread.hf.space/omen.png">
    
    <!-- Apple Touch Icon (για iOS Αρχική Οθόνη) -->
    <link rel="apple-touch-icon" href="omen.png">
    <link rel="apple-touch-icon" sizes="180x180" href="omen.png">
    
    <!-- Favicon & PWA Icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="omen.png">
    <link rel="icon" type="image/png" sizes="16x16" href="omen.png">
    <link rel="shortcut icon" href="omen.png">
    
    <!-- Web App Manifest (για PWA - προσθήκη στην αρχική οθόνη) -->
    <link rel="manifest" href="data:application/json,{
        \"name\": \"Omen\",
        \"short_name\": \"Omen\",
        \"description\": \"Καφεμαντεία με AI\",
        \"start_url\": \".\",
        \"display\": \"standalone\",
        \"background_color\": \"#0a0a12\",
        \"theme_color\": \"#0a0a12\",
        \"icons\": [
            {
                \"src\": \"omen.png\",
                \"sizes\": \"512x512\",
                \"type\": \"image/png\"
            }
        ]
    }">
    
    <!-- ========== STYLES ========== -->
    <style>
        /* ... (όλα τα styles σου όπως τα είχες) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0a12;
            background-image: radial-gradient(circle at 20% 30%, #1a1025 0%, #0a0a12 70%);
            min-height: 100vh;
            color: #f0e6ff;
            padding: 20px 15px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #container { max-width: 600px; width: 100%; position: relative; }
        .title-wrapper { text-align: center; margin-bottom: 20px; position: relative; }
        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            letter-spacing: 2px;
            display: inline-block;
        }
        h1::after { content: "☽"; font-size: 1.8rem; margin-left: 10px; -webkit-text-fill-color: initial; color: #b48bcf; opacity: 0.7; }
        .subtitle {
            color: #b9a6d4;
            font-size: 1rem;
            letter-spacing: 3px;
            margin-top: -5px;
            font-weight: 300;
            border-top: 1px solid rgba(255, 215, 0, 0.15);
            display: inline-block;
            padding-top: 8px;
        }
        .mystic-orb {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #f1c40f, #b8860b);
            border-radius: 50%;
            filter: blur(55px);
            opacity: 0.15;
            position: absolute;
            top: -20px;
            left: -20px;
            z-index: -1;
            animation: floatOrb 6s infinite alternate ease-in-out;
        }
        @keyframes floatOrb { 0% { transform: translate(0,0) scale(1); opacity:0.1; } 100% { transform: translate(30px,20px) scale(1.4); opacity:0.25; } }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0 25px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
            overflow: hidden;
        }
        .btn::before {
            content: ""; position: absolute; top:-50%; left:-50%; width:200%; height:200%;
            background: radial-gradient(circle at 30%30%, rgba(255,255,240,0.1), transparent 70%);
            opacity:0; transition: opacity 0.5s; pointer-events: none;
        }
        .btn:hover::before { opacity:1; }
        .btn:active { transform:scale(0.95); }
        
        .btn-gold { background: linear-gradient(145deg, #f7dc6f, #d4ac0d); color:#1a0e1f; box-shadow:0 0 20px rgba(241,196,15,0.25); }
        .btn-gold:hover { transform:translateY(-3px) scale(1.02); box-shadow:0 8px 30px rgba(241,196,15,0.4); }
        .btn-purple { background: linear-gradient(145deg, #a569bd, #7d3c98); color:#fff; box-shadow:0 0 20px rgba(155,89,182,0.25); }
        .btn-purple:hover { transform:translateY(-3px) scale(1.02); box-shadow:0 8px 30px rgba(155,89,182,0.5); }
        .btn-green { background: linear-gradient(145deg, #2ecc71, #1e8449); color:#fff; width:100%; padding:16px; font-size:1.1rem; margin-top:12px; border-radius:50px; box-shadow:0 0 30px rgba(46,204,113,0.2); }
        .btn-green:hover:not(:disabled) { transform:translateY(-3px) scale(1.01); box-shadow:0 8px 40px rgba(46,204,113,0.5); }
        .btn-green:disabled { background:#3a3a4a; color:#777; box-shadow:none; cursor:not-allowed; }
        .btn-red { background: linear-gradient(145deg, #e74c3c, #a93226); color:#fff; box-shadow:0 0 20px rgba(231,76,60,0.3); width:100%; max-width:300px; }
        .btn-red:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 6px 30px rgba(231,76,60,0.5); }
        
        #camera-wrapper { display:none; width:100%; max-width:420px; margin:15px auto; border-radius:30px; border:2px solid rgba(255,215,0,0.3); overflow:hidden; background:#0f0a18; box-shadow:0 0 50px rgba(241,196,15,0.08); }
        video { width:100%; display:block; border-radius:28px; }
        #preview-wrapper { display:none; margin:20px auto; text-align:center; }
        #preview-img { max-width:220px; width:100%; border-radius:30px; border:2px solid #d4af37; box-shadow:0 0 30px rgba(212,175,55,0.2); }
        .preview-label { color:#d4af37; font-weight:300; letter-spacing:2px; margin-bottom:8px; font-size:0.9rem; }
        
        #loading { display:none; margin:30px 0; font-size:1.2rem; color:#f1c40f; font-weight:400; letter-spacing:2px; animation:mysticPulse 2s infinite ease-in-out; }
        @keyframes mysticPulse { 0%{opacity:0.5; transform:scale(0.98);} 50%{opacity:1; transform:scale(1.04);} 100%{opacity:0.5; transform:scale(0.98);} }
        #loading::before { content:"✨ "; font-size:1.8rem; }
        #loading::after { content:" ✨"; font-size:1.8rem; }
        
        #result-area { display:none; background:rgba(20,12,30,0.75); backdrop-filter:blur(8px); border-radius:40px; padding:25px 20px; margin-top:25px; border:1px solid rgba(255,215,0,0.15); box-shadow:0 0 70px rgba(100,70,150,0.15); }
        #result-area h2 { color:#f5d76e; font-weight:300; text-align:center; border-bottom:1px dashed rgba(255,215,0,0.2); padding-bottom:12px; margin-bottom:20px; letter-spacing:4px; font-size:1.8rem; }
        .symbol-item { background:rgba(30,18,45,0.7); padding:18px; margin:16px 0; border-radius:24px; border-left:6px solid #d4af37; box-shadow:0 6px 20px rgba(0,0,0,0.6); backdrop-filter:blur(2px); }
        .symbol-item:hover { transform:translateX(4px); border-left-color:#f1c40f; background:rgba(40,25,60,0.8); }
        .symbol-name { color:#f7dc6f; font-weight:600; font-size:1.3rem; display:flex; align-items:center; gap:8px; }
        .symbol-name::before { content:"🜁"; font-size:1.5rem; opacity:0.7; }
        .symbol-position { color:#b8a0d0; font-size:0.8rem; font-style:italic; margin:4px 0 10px; letter-spacing:1px; }
        .symbol-interpretation { color:#e6d5f5; font-size:0.98rem; line-height:1.6; padding-left:4px; }
        
        .btn-reset { background:transparent; border:1px solid rgba(255,215,0,0.3); color:#f7dc6f; padding:12px 30px; border-radius:60px; font-weight:400; letter-spacing:2px; transition:all 0.3s; margin-top:10px; }
        .btn-reset:hover { background:rgba(255,215,0,0.08); border-color:#f1c40f; box-shadow:0 0 30px rgba(241,196,15,0.1); }
        
        @media (max-width:480px) { h1 { font-size:2rem; } .btn { padding:10px 18px; font-size:0.85rem; } }
    </style>
</head>
<body>
    <!-- (Το σώμα της σελίδας παραμένει ακριβώς ίδιο με το προηγούμενο) -->
    <!-- Το έβαλα εδώ συνοπτικά για να μην χαθεί -->
    <div id="container">
        <div class="title-wrapper">
            <div class="mystic-orb"></div>
            <h1>OmenRead</h1>
            <div class="subtitle">✦ Καφεμαντεία με AI ✦</div>
        </div>
        <!-- Controls -->
        <div class="controls" id="inputControls">
            <button class="btn btn-gold" onclick="openCamera('environment')">📷 Πίσω Κάμερα</button>
            <button class="btn btn-gold" onclick="openCamera('user')">🤳 Selfie</button>
            <button class="btn btn-purple" onclick="document.getElementById('fileInput').click()">📁 Ανέβασμα</button>
            <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="handleUpload(event)">
        </div>
        <!-- Camera -->
        <div id="camera-wrapper">
            <video id="webcam" playsinline autoplay></video>
        </div>
        <button class="btn btn-red" id="captureBtn" onclick="takePhoto()" style="display:none; margin: 10px auto;">📸 Λήψη</button>
        <!-- Preview -->
        <div id="preview-wrapper">
            <div class="preview-label">✧ Η εικόνα είναι έτοιμη ✧</div>
            <img id="preview-img" src="" alt="Φλιτζάνι">
        </div>
        <!-- Scan -->
        <button class="btn btn-green" id="scanBtn" onclick="startAnalysis()" disabled>🔮 Ανάλυση Φλιτζανιού</button>
        <!-- Loading -->
        <div id="loading">Η Μαντάμ Ζαΐρα διαβάζει τις σκιές...</div>
        <!-- Results -->
        <div id="result-area">
            <h2>☽ Η Ετυμηγορία του Καφέ ☾</h2>
            <div id="symbols-container"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-reset" onclick="resetApp()">🔄 Διάβασε άλλο φλιτζάνι</button>
            </div>
        </div>
    </div>
    <script>
        // (Το script σου ακριβώς ίδιο - το παρέθεσα για πληρότητα)
        const API_URL = "https://franklymadear-omenread.hf.space/analyze";
        const video = document.getElementById('webcam');
        let currentStream = null;
        let currentImageBase64 = null;
        function resetAppUI() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('preview-wrapper').style.display = 'none';
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('loading').style.display = 'none';
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }
        function resetApp() {
            resetAppUI();
            currentImageBase64 = null;
            document.getElementById('inputControls').style.display = 'flex';
            document.getElementById('scanBtn').style.display = 'block';
            document.getElementById('fileInput').value = "";
        }
        async function openCamera(facingMode) {
            resetAppUI();
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: facingMode } }
                });
                video.srcObject = currentStream;
                document.getElementById('camera-wrapper').style.display = 'block';
                document.getElementById('captureBtn').style.display = 'flex';
                document.getElementById('camera-wrapper').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error("Camera error:", err);
                alert("Δεν μπόρεσα να ανοίξω την κάμερα. Δοκίμασε το 'Ανέβασμα'.");
            }
        }
        function takePhoto() {
            if (!currentStream) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            currentImageBase64 = canvas.toDataURL('image/jpeg');
            currentStream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            showPreview(currentImageBase64);
        }
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            resetAppUI();
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                showPreview(currentImageBase64);
            };
            reader.readAsDataURL(file);
        }
        function showPreview(imageSrc) {
            document.getElementById('preview-img').src = imageSrc;
            document.getElementById('preview-wrapper').style.display = 'block';
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanBtn').scrollIntoView({ behavior: 'smooth' });
        }
        async function startAnalysis() {
            if (!currentImageBase64) return;
            document.getElementById('inputControls').style.display = 'none';
            document.getElementById('preview-wrapper').style.display = 'none';
            document.getElementById('scanBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: currentImageBase64 })
                });
                if (!response.ok) throw new Error(`Server error: ${response.status}`);
                const data = await response.json();
                if (data.success && data.symbols) {
                    renderResults(data.symbols);
                } else {
                    throw new Error(data.error || "Άγνωστο σφάλμα.");
                }
            } catch (error) {
                console.error(error);
                alert("Πρόβλημα στην ανάλυση: " + error.message);
                resetApp();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        function renderResults(symbols) {
            const resultArea = document.getElementById('result-area');
            const container = document.getElementById('symbols-container');
            let html = "";
            symbols.forEach(s => {
                html += `
                    <div class="symbol-item">
                        <div class="symbol-name">${s.name || "Μυστικό σύμβολο"}</div>
                        <div class="symbol-position">📍 ${s.position || "θέση άγνωστη"}</div>
                        <div class="symbol-interpretation">${s.interpretation || "Η σκιά κρύβει νόημα..."}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
