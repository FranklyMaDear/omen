<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omen - Καφεμαντεία με AI</title>
    
    <meta name="description" content="Διάβασε το φλιτζάνι του καφέ σου με AI. Μυστική εμπειρία.">
    <meta property="og:title" content="Omen - Καφεμαντεία">
    <meta property="og:image" content="omen.png">
    <meta name="apple-touch-icon" href="omen.png">
    <link rel="icon" type="image/png" href="omen.png">
    
    <style>
        /* ===== RESET & BASE ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            color: #f0e6ff;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND MAGIC ===== */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== PAGES ===== */
        .page {
            position: relative;
            z-index: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .page.active { display: flex; }

        /* ===== SPLASH PAGE ===== */
        #splash {
            text-align: center;
            gap: 20px;
            animation: fadeIn 1.2s ease;
        }
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        .splash-icon {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(241, 196, 15, 0.25);
            border: 3px solid rgba(255, 215, 0, 0.3);
            transition: all 0.5s;
            animation: floatIcon 4s infinite ease-in-out;
            object-fit: cover;
        }
        @keyframes floatIcon {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-12px) scale(1.02); box-shadow: 0 0 120px rgba(241, 196, 15, 0.4); }
            100% { transform: translateY(0px) scale(1); }
        }

        .splash-title {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(243, 156, 18, 0.2);
        }
        .splash-sub {
            color: #b9a6d4;
            font-size: 1.1rem;
            letter-spacing: 4px;
            border-top: 1px solid rgba(255, 215, 0, 0.15);
            padding-top: 10px;
            margin-top: 5px;
        }
        .splash-desc {
            color: #ccc;
            max-width: 320px;
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.8;
        }

        .btn-mystic {
            background: linear-gradient(145deg, #f7dc6f, #d4ac0d);
            color: #1a0e1f;
            padding: 18px 54px;
            border: none;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 3px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn-mystic::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.8s;
        }
        .btn-mystic:hover::after { opacity: 1; }
        .btn-mystic:hover {
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 0 70px rgba(241, 196, 15, 0.5);
        }

        /* ===== SCAN PAGE ===== */
        #scan {
            gap: 15px;
            padding-top: 20px;
            padding-bottom: 30px;
            justify-content: flex-start;
        }

        /* Πάνω μέρος: τίτλος + εικόνα */
        .scan-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
            width: 100%;
        }
        .scan-header .omen-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
        }
        .scan-header .omen-logo img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
            border: 2px solid rgba(255, 215, 0, 0.3);
            object-fit: cover;
        }
        .scan-header .omen-logo h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.2);
        }
        .scan-header .sub-scan {
            color: #b9a6d4;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: -5px;
        }

        /* Επιλογή φύλου */
        .gender-selector {
            background: rgba(30, 18, 45, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 12px 20px;
            margin: 5px 0 10px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        .gender-selector label {
            color: #e6d5f5;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .gender-selector label:hover { color: #f7dc6f; }
        .gender-selector input[type="radio"] {
            accent-color: #d4af37;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Controls + Buttons */
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 8px 0 12px; }
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            min-width: 140px;
        }
        .btn::before {
            content: ""; position: absolute; top:-50%; left:-50%; width:200%; height:200%;
            background: radial-gradient(circle at 30%30%, rgba(255,255,240,0.08), transparent 70%);
            opacity:0; transition: opacity 0.6s; pointer-events: none;
        }
        .btn:hover::before { opacity:1; }
        .btn:active { transform:scale(0.95); }
        
        .btn-gold { background: linear-gradient(145deg, #f7dc6f, #d4ac0d); color:#1a0e1f; box-shadow:0 0 25px rgba(241,196,15,0.25); }
        .btn-gold:hover { transform:translateY(-4px) scale(1.03); box-shadow:0 10px 40px rgba(241,196,15,0.5); }
        .btn-purple { background: linear-gradient(145deg, #a569bd, #7d3c98); color:#fff; box-shadow:0 0 25px rgba(155,89,182,0.25); }
        .btn-purple:hover { transform:translateY(-4px) scale(1.03); box-shadow:0 10px 40px rgba(155,89,182,0.5); }
        .btn-green { background: linear-gradient(145deg, #2ecc71, #1e8449); color:#fff; width:100%; padding:18px; font-size:1.2rem; margin-top:12px; border-radius:50px; box-shadow:0 0 35px rgba(46,204,113,0.2); }
        .btn-green:hover:not(:disabled) { transform:translateY(-4px) scale(1.02); box-shadow:0 10px 50px rgba(46,204,113,0.5); }
        .btn-green:disabled { background:#3a3a4a; color:#777; box-shadow:none; cursor:not-allowed; transform:none; }
        .btn-red { background: linear-gradient(145deg, #e74c3c, #a93226); color:#fff; box-shadow:0 0 25px rgba(231,76,60,0.25); width:100%; max-width:320px; }
        .btn-red:hover { transform:translateY(-4px) scale(1.03); box-shadow:0 10px 40px rgba(231,76,60,0.5); }

        #camera-wrapper { display:none; width:100%; max-width:420px; margin:8px auto; border-radius:30px; border:2px solid rgba(255,215,0,0.3); overflow:hidden; background:#0f0a18; box-shadow:0 0 50px rgba(241,196,15,0.06); }
        video { width:100%; display:block; border-radius:28px; }
        #preview-wrapper { display:none; margin:12px auto; text-align:center; }
        #preview-img { max-width:220px; width:100%; border-radius:30px; border:2px solid #d4af37; box-shadow:0 0 30px rgba(212,175,55,0.15); }
        .preview-label { color:#d4af37; font-weight:300; letter-spacing:2px; margin-bottom:6px; font-size:0.9rem; }

        #loading { display:none; margin:15px 0; font-size:1.3rem; color:#f1c40f; font-weight:400; letter-spacing:2px; animation:mysticPulse 2s infinite ease-in-out; white-space: nowrap; }
        @keyframes mysticPulse { 0%{opacity:0.5; transform:scale(0.98);} 50%{opacity:1; transform:scale(1.04);} 100%{opacity:0.5; transform:scale(0.98);} }
        #loading::before { content:"✨ "; font-size:1.8rem; }
        #loading::after { content:" ✨"; font-size:1.8rem; }

        #result-area { display:none; background:rgba(20,12,30,0.85); backdrop-filter:blur(8px); border-radius:40px; padding:25px 20px; margin-top:20px; border:1px solid rgba(255,215,0,0.1); box-shadow:0 0 70px rgba(100,70,150,0.1); width:100%; }
        #result-area h2 { color:#f5d76e; font-weight:300; text-align:center; border-bottom:1px dashed rgba(255,215,0,0.2); padding-bottom:12px; margin-bottom:20px; letter-spacing:4px; font-size:1.8rem; }
        .symbol-item { background:rgba(30,18,45,0.7); padding:18px; margin:16px 0; border-radius:24px; border-left:6px solid #d4af37; box-shadow:0 6px 20px rgba(0,0,0,0.6); backdrop-filter:blur(2px); }
        .symbol-item:hover { transform:translateX(4px); border-left-color:#f1c40f; background:rgba(40,25,60,0.8); }
        .symbol-name { color:#f7dc6f; font-weight:600; font-size:1.3rem; display:flex; align-items:center; gap:8px; }
        .symbol-name::before { content:"🜁"; font-size:1.5rem; opacity:0.7; }
        .symbol-position { color:#b8a0d0; font-size:0.8rem; font-style:italic; margin:4px 0 10px; letter-spacing:1px; }
        .symbol-interpretation { color:#e6d5f5; font-size:0.98rem; line-height:1.6; padding-left:4px; }

        .btn-reset { background:transparent; border:1px solid rgba(255,215,0,0.3); color:#f7dc6f; padding:14px 36px; border-radius:60px; font-weight:400; font-size:1rem; letter-spacing:2px; transition:all 0.3s; margin-top:10px; }
        .btn-reset:hover { background:rgba(255,215,0,0.08); border-color:#f1c40f; box-shadow:0 0 30px rgba(241,196,15,0.1); }

        /* Κουμπί «Πίσω στην αρχή» στο κάτω μέρος */
        .btn-back-wrapper {
            margin-top: auto;
            padding-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: #b9a6d4;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
        }
        .btn-back:hover {
            color: #f7dc6f;
            border-color: #d4af37;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.1);
            transform: scale(1.03);
        }

        @media (max-width:480px) {
            .splash-title { font-size: 2.4rem; }
            .splash-icon { width: 140px; height: 140px; }
            .btn { padding: 14px 24px; font-size: 0.95rem; min-width: 110px; }
            .scan-header .omen-logo img { width: 55px; height: 55px; }
            .scan-header .omen-logo h1 { font-size: 1.8rem; }
            .gender-selector { gap: 15px; padding: 10px 16px; }
            #loading { font-size: 1rem; white-space: normal; }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND CANVAS ===== -->
    <canvas id="bg-canvas"></canvas>

    <!-- ===== SPLASH ===== -->
    <div id="splash" class="page active">
        <img src="omen.png" alt="Omen" class="splash-icon" id="splashIcon">
        <div class="splash-title">Omen</div>
        <div class="splash-sub">✦ Καφεμαντεία με AI ✦</div>
        <div class="splash-desc">Η Μαντάμ Ζαΐρα σε περιμένει. Άφησε τις σκιές του καφέ να αποκαλύψουν το πεπρωμένο σου.</div>
        <button class="btn-mystic" onclick="goToScan()">🔮 Ξεκίνησε το ταξίδι</button>
    </div>

    <!-- ===== SCAN ===== -->
    <div id="scan" class="page">
        <!-- Πάνω μέρος: τίτλος Omen + εικόνα -->
        <div class="scan-header">
            <div class="omen-logo">
                <img src="omen.png" alt="Omen">
                <h1>Omen</h1>
            </div>
            <div class="sub-scan">✦ Καφεμαντεία με AI ✦</div>
        </div>

        <!-- Επιλογή φύλου -->
        <div class="gender-selector">
            <label>
                <input type="radio" name="gender" value="γυναίκα" checked>
                ♀ Γυναίκα
            </label>
            <label>
                <input type="radio" name="gender" value="άντρας">
                ♂ Άντρας
            </label>
        </div>

        <div class="controls" id="inputControls">
            <button class="btn btn-gold" onclick="openCamera('environment')">📷 Πίσω Κάμερα</button>
            <button class="btn btn-gold" onclick="openCamera('user')">🤳 Selfie</button>
            <button class="btn btn-purple" onclick="document.getElementById('fileInput').click()">📁 Ανέβασμα</button>
            <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="handleUpload(event)">
        </div>

        <div id="camera-wrapper">
            <video id="webcam" playsinline autoplay></video>
        </div>
        <button class="btn btn-red" id="captureBtn" onclick="takePhoto()" style="display:none; margin: 8px auto;">📸 Λήψη</button>

        <div id="preview-wrapper">
            <div class="preview-label">✧ Η εικόνα είναι έτοιμη ✧</div>
            <img id="preview-img" src="" alt="Φλιτζάνι">
        </div>

        <button class="btn btn-green" id="scanBtn" onclick="startAnalysis()" disabled>🔮 Ανάλυση Φλιτζανιού</button>

        <!-- Το loading σε μία σειρά (white-space: nowrap) -->
        <div id="loading">Η Μαντάμ Ζαΐρα διαβάζει τις σκιές...</div>

        <div id="result-area">
            <h2>☽ Η Ετυμηγορία του Καφέ ☾</h2>
            <div id="symbols-container"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-reset" onclick="resetScan()">🔄 Διάβασε άλλο φλιτζάνι</button>
            </div>
        </div>

        <!-- Κουμπί «Πίσω στην αρχή» στο κάτω μέρος -->
        <div class="btn-back-wrapper">
            <button class="btn-back" onclick="goToSplash()">☽ Πίσω στην αρχή</button>
        </div>
    </div>

    <script>
        // ===== BACKGROUND STARS =====
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createStars(count = 150) {
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    dx: (Math.random() - 0.5) * 0.4,
                    dy: (Math.random() - 0.5) * 0.4,
                    alpha: Math.random() * 0.8 + 0.2
                });
            }
        }
        createStars();

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.x += s.dx;
                s.y += s.dy;
                if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
                if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 150, ${s.alpha * 0.7})`;
                ctx.fill();
                ctx.shadowColor = 'rgba(255, 215, 0, 0.1)';
                ctx.shadowBlur = 12;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ===== PAGE SWITCH =====
        function goToScan() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('scan').classList.add('active');
            resetScanUI();
        }

        function goToSplash() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('splash').classList.add('active');
        }

        // ===== SCAN LOGIC =====
        const API_URL = "https://franklymadear-omenread.hf.space/analyze";
        const video = document.getElementById('webcam');
        let currentStream = null;
        let currentImageBase64 = null;

        function resetScanUI() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('preview-wrapper').style.display = 'none';
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('loading').style.display = 'none';
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function resetScan() {
            resetScanUI();
            currentImageBase64 = null;
            document.getElementById('inputControls').style.display = 'flex';
            document.getElementById('scanBtn').style.display = 'block';
            document.getElementById('fileInput').value = "";
        }

        async function openCamera(facingMode) {
            resetScanUI();
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: facingMode } }
                });
                video.srcObject = currentStream;
                document.getElementById('camera-wrapper').style.display = 'block';
                document.getElementById('captureBtn').style.display = 'flex';
                document.getElementById('camera-wrapper').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error("Camera error:", err);
                alert("Δεν μπόρεσα να ανοίξω την κάμερα. Δοκίμασε το 'Ανέβασμα'.");
            }
        }

        function takePhoto() {
            if (!currentStream) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            currentImageBase64 = canvas.toDataURL('image/jpeg');
            currentStream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            showPreview(currentImageBase64);
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            resetScanUI();
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                showPreview(currentImageBase64);
            };
            reader.readAsDataURL(file);
        }

        function showPreview(imageSrc) {
            document.getElementById('preview-img').src = imageSrc;
            document.getElementById('preview-wrapper').style.display = 'block';
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanBtn').scrollIntoView({ behavior: 'smooth' });
        }

        async function startAnalysis() {
            if (!currentImageBase64) return;
            const gender = document.querySelector('input[name="gender"]:checked').value;

            document.getElementById('inputControls').style.display = 'none';
            document.getElementById('preview-wrapper').style.display = 'none';
            document.getElementById('scanBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: currentImageBase64,
                        gender: gender
                    })
                });
                if (!response.ok) throw new Error(`Server error: ${response.status}`);
                const data = await response.json();
                if (data.success && data.symbols) {
                    renderResults(data.symbols);
                } else {
                    throw new Error(data.error || "Άγνωστο σφάλμα.");
                }
            } catch (error) {
                console.error(error);
                alert("Πρόβλημα στην ανάλυση: " + error.message);
                resetScan();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderResults(symbols) {
            const resultArea = document.getElementById('result-area');
            const container = document.getElementById('symbols-container');
            let html = "";
            symbols.forEach(s => {
                html += `
                    <div class="symbol-item">
                        <div class="symbol-name">${s.name || "Μυστικό σύμβολο"}</div>
                        <div class="symbol-position">📍 ${s.position || "θέση άγνωστη"}</div>
                        <div class="symbol-interpretation">${s.interpretation || "Η σκιά κρύβει νόημα..."}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('splashIcon').addEventListener('click', goToScan);
    </script>
</body>
</html>
