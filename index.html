<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omen - Καφεμαντεία με AI</title>
    
    <meta name="description" content="Διάβασε το φλιτζάνι του καφέ σου με AI. Μυστική εμπειρία.">
    
    <style>
        /* ===== RESET & BASE ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            color: #f0e6ff;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .page.active { display: flex; }

        #splash {
            text-align: center;
            gap: 20px;
            animation: fadeIn 1.2s ease;
        }
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        .splash-icon {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(241, 196, 15, 0.25);
            border: 3px solid rgba(255, 215, 0, 0.3);
            transition: all 0.5s;
            animation: floatIcon 4s infinite ease-in-out;
            object-fit: cover;
            background: linear-gradient(135deg, #2a1a3a, #1a0e2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #f7dc6f;
            cursor: pointer;
        }
        @keyframes floatIcon {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-12px) scale(1.02); box-shadow: 0 0 120px rgba(241, 196, 15, 0.4); }
            100% { transform: translateY(0px) scale(1); }
        }

        .splash-title {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }
        .splash-sub {
            color: #b9a6d4;
            font-size: 1.1rem;
            letter-spacing: 4px;
            border-top: 1px solid rgba(255, 215, 0, 0.15);
            padding-top: 10px;
            margin-top: 5px;
        }
        .splash-desc {
            color: #ccc;
            max-width: 320px;
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.8;
        }

        .btn-mystic {
            background: linear-gradient(145deg, #f7dc6f, #d4ac0d);
            color: #1a0e1f;
            padding: 16px 48px;
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 3px;
            margin-top: 10px;
        }
        .btn-mystic:hover {
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 0 70px rgba(241, 196, 15, 0.5);
        }

        #scan { gap: 20px; padding-top: 30px; padding-bottom: 40px; }
        #scan .scan-header { text-align: center; width: 100%; }
        #scan .scan-header h2 {
            font-size: 2rem;
            background: linear-gradient(135deg, #e6c27a, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }
        #scan .scan-header p {
            color: #b8a0d0;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 10px 0 15px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-gold { background: linear-gradient(145deg, #f7dc6f, #d4ac0d); color: #1a0e1f; }
        .btn-gold:hover { transform: translateY(-3px); }
        .btn-purple { background: linear-gradient(145deg, #a569bd, #7d3c98); color: #fff; }
        .btn-purple:hover { transform: translateY(-3px); }
        .btn-green { background: linear-gradient(145deg, #2ecc71, #1e8449); color: #fff; width: 100%; padding: 16px; font-size: 1.1rem; margin-top: 12px; border-radius: 50px; }
        .btn-green:hover:not(:disabled) { transform: translateY(-3px); }
        .btn-green:disabled { background: #3a3a4a; color: #777; cursor: not-allowed; }
        .btn-red { background: linear-gradient(145deg, #e74c3c, #a93226); color: #fff; width: 100%; max-width: 300px; }
        .btn-red:hover { transform: translateY(-2px); }

        #camera-wrapper { display: none; width: 100%; max-width: 420px; margin: 10px auto; border-radius: 30px; border: 2px solid rgba(255,215,0,0.3); overflow: hidden; background: #0f0a18; }
        video { width: 100%; display: block; border-radius: 28px; }
        
        #preview-wrapper { display: none; margin: 15px auto; text-align: center; }
        #preview-img { max-width: 220px; width: 100%; border-radius: 30px; border: 2px solid #d4af37; }
        .preview-label { color: #d4af37; font-weight: 300; letter-spacing: 2px; margin-bottom: 6px; font-size: 0.9rem; }

        #loading-box {
            display: none;
            text-align: center;
            background: rgba(20, 12, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px 20px;
            margin: 20px auto;
            border: 1px solid rgba(255, 215, 0, 0.15);
            width: 100%;
            max-width: 450px;
        }
        #loading-box .mantra {
            font-size: 1.6rem;
            color: #f5d76e;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 15px;
            animation: mysticPulse 2s infinite ease-in-out;
        }
        @keyframes mysticPulse { 
            0% { opacity: 0.5; transform: scale(0.98); } 
            50% { opacity: 1; transform: scale(1.04); } 
            100% { opacity: 0.5; transform: scale(0.98); } 
        }

        .waiting-text {
            font-size: 1rem;
            color: #b9a6d4;
            letter-spacing: 3px;
            font-weight: 300;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255, 215, 0, 0.05);
        }

        #result-area {
            display: none;
            background: rgba(20, 12, 30, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 25px 20px;
            margin-top: 20px;
            border: 1px solid rgba(255,215,0,0.1);
            width: 100%;
        }
        #result-area h2 {
            color: #f5d76e;
            font-weight: 300;
            text-align: center;
            border-bottom: 1px dashed rgba(255,215,0,0.2);
            padding-bottom: 12px;
            margin-bottom: 20px;
            letter-spacing: 4px;
            font-size: 1.8rem;
        }
        #result-text {
            color: #e6d5f5;
            font-size: 1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid rgba(255,215,0,0.3);
            color: #f7dc6f;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 400;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-reset:hover {
            background: rgba(255,215,0,0.08);
            border-color: #f1c40f;
        }

        .btn-back {
            background: transparent;
            border: none;
            color: #b9a6d4;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
            letter-spacing: 2px;
        }
        .btn-back:hover { color: #f7dc6f; }

        @media (max-width: 480px) {
            .splash-title { font-size: 2.4rem; }
            .splash-icon { width: 140px; height: 140px; }
            .btn { padding: 10px 16px; font-size: 0.85rem; }
            #loading-box .mantra { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <!-- SPLASH PAGE -->
    <div id="splash" class="page active">
        <div class="splash-icon" id="splashIcon" onclick="goToScan()">🔮</div>
        <div class="splash-title">Omen</div>
        <div class="splash-sub">✦ Καφεμαντεία με AI ✦</div>
        <div class="splash-desc">Η Μαντάμ Ζαΐρα σε περιμένει. Άφησε τις σκιές του καφέ να αποκαλύψουν το πεπρωμένο σου.</div>
        <button class="btn-mystic" onclick="goToScan()">🔮 Ξεκίνησε το ταξίδι</button>
    </div>

    <!-- SCAN PAGE -->
    <div id="scan" class="page">
        <button class="btn-back" onclick="goToSplash()">☽ Πίσω στην αρχή</button>
        <div class="scan-header">
            <h2>Ανάλυση Φλιτζανιού</h2>
            <p>Διάλεξε μια εικόνα ή τράβηξε φωτογραφία</p>
        </div>

        <div class="controls" id="inputControls">
            <button class="btn btn-gold" onclick="openCamera('environment')">📷 Πίσω Κάμερα</button>
            <button class="btn btn-gold" onclick="openCamera('user')">🤳 Selfie</button>
            <button class="btn btn-purple" onclick="document.getElementById('fileInput').click()">📁 Ανέβασμα</button>
            <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="handleUpload(event)">
        </div>

        <div id="camera-wrapper">
            <video id="webcam" playsinline autoplay></video>
        </div>
        <button class="btn btn-red" id="captureBtn" onclick="takePhoto()" style="display:none; margin: 10px auto;">📸 Λήψη</button>

        <div id="preview-wrapper">
            <div class="preview-label">✧ Η εικόνα είναι έτοιμη ✧</div>
            <img id="preview-img" src="" alt="Φλιτζάνι">
        </div>

        <button class="btn btn-green" id="scanBtn" onclick="startAnalysis()" disabled>🔮 Ανάλυση Φλιτζανιού</button>

        <div id="loading-box">
            <div class="mantra">✨ Η μαντάμ Ζαΐρα διαβάζει τις σκιές... ✨</div>
            <div class="waiting-text">Παρακαλώ Περίμενε</div>
        </div>

        <div id="result-area">
            <h2>☽ Η Ετυμηγορία του Καφέ ☾</h2>
            <div id="result-text"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-reset" onclick="resetScan()">🔄 Διάβασε άλλο φλιτζάνι</button>
            </div>
        </div>
    </div>

    <script>
        // ===== BACKGROUND STARS =====
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createStars(count = 150) {
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    dx: (Math.random() - 0.5) * 0.4,
                    dy: (Math.random() - 0.5) * 0.4,
                    alpha: Math.random() * 0.8 + 0.2
                });
            }
        }
        createStars();

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.x += s.dx;
                s.y += s.dy;
                if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
                if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 150, ${s.alpha * 0.7})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ===== PAGE NAVIGATION =====
        function goToScan() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('scan').classList.add('active');
            resetScanUI();
        }

        function goToSplash() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('splash').classList.add('active');
        }

        // ===== CAMERA & UPLOAD LOGIC =====
        // ΑΥΤΟΜΑΤΗ ΑΝΙΧΝΕΥΣΗ: Αν τρέχει τοπικά, χρησιμοποιεί localhost
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:7860/analyze'
            : '/analyze';

        const video = document.getElementById('webcam');
        let currentStream = null;
        let currentImageBase64 = null;
        let isAnalyzing = false;

        function resetScanUI() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('preview-wrapper').style.display = 'none';
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('loading-box').style.display = 'none';
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function resetScan() {
            resetScanUI();
            currentImageBase64 = null;
            isAnalyzing = false;
            document.getElementById('inputControls').style.display = 'flex';
            document.getElementById('scanBtn').style.display = 'block';
            document.getElementById('fileInput').value = "";
        }

        async function openCamera(facingMode) {
            resetScanUI();
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: facingMode } }
                });
                video.srcObject = currentStream;
                document.getElementById('camera-wrapper').style.display = 'block';
                document.getElementById('captureBtn').style.display = 'flex';
            } catch (err) {
                console.error("Camera error:", err);
                alert("Δεν μπόρεσα να ανοίξω την κάμερα. Δοκίμασε το 'Ανέβασμα'.");
            }
        }

        function takePhoto() {
            if (!currentStream) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
            
            currentStream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            showPreview(currentImageBase64);
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            resetScanUI();
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const compressed = compressImage(img, 800, 0.7);
                    currentImageBase64 = compressed;
                    showPreview(currentImageBase64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function compressImage(image, maxWidth, quality) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let width = image.width;
            let height = image.height;
            
            if (width > maxWidth) {
                const ratio = maxWidth / width;
                width = maxWidth;
                height = height * ratio;
            }
            
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(image, 0, 0, width, height);
            return canvas.toDataURL('image/jpeg', quality);
        }

        function showPreview(imageSrc) {
            document.getElementById('preview-img').src = imageSrc;
            document.getElementById('preview-wrapper').style.display = 'block';
            document.getElementById('scanBtn').disabled = false;
        }

        // ===== ANALYSIS =====
        async function startAnalysis() {
            if (!currentImageBase64 || isAnalyzing) return;

            isAnalyzing = true;
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('inputControls').style.display = 'none';
            document.getElementById('preview-wrapper').style.display = 'none';
            document.getElementById('scanBtn').style.display = 'none';
            document.getElementById('loading-box').style.display = 'block';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: currentImageBase64 })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success && data.symbols) {
                    // Το backend στέλνει απλό κείμενο, το εμφανίζουμε ως έχει
                    document.getElementById('result-text').textContent = data.symbols;
                    document.getElementById('result-area').style.display = 'block';
                } else {
                    throw new Error(data.error || "Άγνωστο σφάλμα");
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Κάτι δεν πήγε καλά. Δοκίμασε ξανά.");
                resetScan();
            } finally {
                document.getElementById('loading-box').style.display = 'none';
                isAnalyzing = false;
            }
        }
    </script>
</body>
</html>
