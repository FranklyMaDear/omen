```html
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmenRead - Καφεμαντεία με AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d0d0d; color: #fff; text-align: center; padding: 20px; }
        #camera-wrapper { width: 100%; max-width: 500px; margin: 20px auto; border-radius: 20px; border: 3px solid #FFD700; overflow: hidden; background: #111; }
        video { width: 100%; display: block; }
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-gold { background: #FFD700; color: #111; }
        .btn-green { background: #2ecc71; color: #fff; }
        #result-area { display: none; background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; text-align: left; }
        .symbol-item { background: #222; padding: 12px; margin: 10px 0; border-radius: 10px; border-left: 3px solid #FFD700; }
        #loading { display: none; margin: 15px; color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>
    <h1>OmenRead</h1>
    <div id="camera-wrapper">
        <video id="webcam" playsinline></video>
    </div>
    <div class="controls">
        <button class="btn btn-gold" id="startBtn" onclick="startCamera()">📷 Κάμερα</button>
        <button class="btn btn-green" id="scanBtn" onclick="scanAndAnalyze()" disabled>🔍 Ανάλυση</button>
    </div>
    <div id="loading">⏳ Η Μαντάμ Ζαΐρα διαβάζει το φλιτζάνι...</div>
    <div id="result-area">
        <h2>🔮 Αποτελέσματα</h2>
        <div id="result-text"></div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        let currentImage = null;
        let camera = null;

        async function startCamera() {
            camera = new Camera(video, { onFrame: async () => {}, width: 500, height: 500 });
            await camera.start();
            document.getElementById('startBtn').textContent = "📸 Λήψη Φωτογραφίας";
            document.getElementById('startBtn').onclick = takePhoto;
        }

        function takePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentImage = canvas.toDataURL('image/jpeg');
            document.getElementById('scanBtn').disabled = false;
            alert("Η φωτογραφία λήφθηκε! Πάτα 'Ανάλυση'.");
        }

        async function scanAndAnalyze() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: currentImage })
                });
                const data = await response.json();
                if (data.success) {
                    displayResult(data);
                } else {
                    alert("Σφάλμα: " + data.error);
                }
            } catch (err) {
                alert("Σφάλμα σύνδεσης: " + err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResult(r) {
            const area = document.getElementById('result-area');
            const text = document.getElementById('result-text');
            area.style.display = 'block';
            text.innerHTML = r.symbols.map(s => `
                <div class="symbol-item">
                    <strong>${s.name}</strong> (${s.position})<br>
                    ${s.interpretation}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
